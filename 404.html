    <!-- Branded boot splash: shown instantly (inline, no asset wait) so launching
         from the homescreen never flashes a blank page. main.ts fades it out once
         the first route is ready. Styles are inline & self-contained on purpose. -->
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: radial-gradient(120% 90% at 50% 0%, #ffffff, #f1f5f0);
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      #boot-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }
      #boot-splash .boot-logo {
        width: 112px;
        height: 112px;
        border-radius: 28px;
        box-shadow: 0 18px 40px rgba(67, 176, 42, 0.3), 0 4px 12px rgba(20, 26, 33, 0.12);
        animation: boot-pop 0.6s cubic-bezier(0.2, 1.3, 0.4, 1) both;
      }
      #boot-splash .boot-name {
        font-family: "Fredoka", system-ui, -apple-system, "Segoe UI", sans-serif;
        font-weight: 600;
        font-size: 26px;
        letter-spacing: -0.01em;
        color: #16202b;
        animation: boot-fade 0.5s ease 0.15s both;
      }
      #boot-splash .boot-spin {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(67, 176, 42, 0.22);
        border-top-color: #43b02a;
        animation: boot-rot 0.8s linear infinite;
      }
      @keyframes boot-pop {
        0% { transform: scale(0.6); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes boot-fade {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: none; }
      }
      @keyframes boot-rot {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash .boot-logo,
        #boot-splash .boot-name { animation: none; }
        #boot-splash .boot-spin { animation-duration: 1.6s; }
      }
    </style>
