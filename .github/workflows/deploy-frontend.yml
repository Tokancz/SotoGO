name: Deploy frontend (GitHub Pages)

# Builds the Vue app and publishes it to the gh-pages branch on every push to main.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # Not `npm ci`: npm prunes platform-specific optional deps (e.g. the
        # @napi-rs/@emnapi wasm runtime) from a Windows-generated lockfile, so a
        # strict `npm ci` on the Linux runner fails with "Missing … from lock
        # file". `npm install` reconciles the optionals on the runner. See npm/cli#4828.
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: frontend
        env:
          # Served from https://<user>.github.io/SotoGO/
          VITE_BASE: /SotoGO/
          # Set these in repo Settings → Secrets and variables → Actions → Variables
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: SPA fallback (deep links / refresh)
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
