<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ŠotoGO — přihlášení</title>
<link rel="stylesheet" href="../design-system/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../design-system/_ds_bundle.js"></script>
<style>
  html, body { margin:0; height:100%; }
  body { background: var(--surface-sunken); display:flex; align-items:center; justify-content:center; min-height:100vh; font-family: var(--font-body); padding:20px 0; }

  .sg-phone {
    position: relative; width: 390px; height: 844px; flex:none;
    background: #000; border-radius: 52px; padding: 11px;
    box-shadow: 0 50px 100px rgba(20,26,33,.34), 0 0 0 2px #1a1f25;
  }
  .sg-phone__notch { position:absolute; top:11px; left:50%; transform:translateX(-50%); width:128px; height:30px; background:#000; border-radius:0 0 18px 18px; z-index:10; }
  .sg-screen { position: relative; width: 100%; height: 100%; border-radius: 42px; overflow: hidden; background: var(--brand); }

  /* ---- Scroll container: hero + sheet scroll together (native collapsing header) ---- */
  .lg-scroll { position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  .lg-scroll::-webkit-scrollbar { width:0; }
  /* sticky green wash under the status bar so it stays legible once the form scrolls up */
  .lg-topsafe { position:sticky; top:0; height:46px; margin-bottom:-46px; z-index:4; pointer-events:none;
    background: linear-gradient(180deg, var(--green-500) 0%, var(--green-500) 55%, transparent 100%); }

  /* ---- Brand hero ---- */
  .lg-hero {
    position:relative; height:300px;
    background:
      radial-gradient(120% 80% at 50% -10%, var(--green-400) 0%, var(--green-500) 42%, var(--green-600) 100%);
    overflow:hidden;
  }
  .lg-hero__sheen { position:absolute; inset:0; background:
      radial-gradient(60% 40% at 78% 8%, rgba(255,255,255,.18), transparent 60%); }
  /* faint locator rings echoing the map player dot */
  .lg-ring { position:absolute; left:50%; top:118px; transform:translate(-50%,-50%); border-radius:50%; border:1.5px solid rgba(255,255,255,.12); }

  .lg-mark {
    position:absolute; top:96px; left:50%; transform:translateX(-50%);
    width:78px; height:78px; border-radius:21px;
    box-shadow: 0 14px 30px rgba(11,28,8,.4), 0 0 0 6px rgba(255,255,255,.10);
    display:block;
  }
  .lg-wordmark { position:absolute; top:190px; left:0; right:0; text-align:center;
    font-family:var(--font-display); font-weight:600; font-size:34px; letter-spacing:-.02em; color:#fff; }
  .lg-wordmark .go { color: var(--green-200); }
  .lg-tag { position:absolute; top:236px; left:0; right:0; text-align:center;
    font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.72); }

  /* ---- Sheet (rises over the hero on scroll) ---- */
  .lg-sheet {
    position:relative; z-index:2; margin-top:-30px;
    min-height: 100%;   /* full-viewport tall so the hero can scroll fully off-screen */
    background: var(--bg-app);
    border-radius: 30px 30px 0 0;
    box-shadow: 0 -10px 40px rgba(11,28,8,.18);
    display:flex; flex-direction:column;
  }
  .lg-grab { width:40px; height:5px; border-radius:999px; background:var(--border-strong); margin:10px auto 0; flex:none; }
  .lg-sheet__body { flex:1; padding:14px 22px 26px; display:flex; flex-direction:column; gap:16px; }

  .lg-title { font-family:var(--font-display); font-weight:600; font-size:22px; color:var(--text-primary); margin:2px 0 0; }
  .lg-sub { font-size:13.5px; color:var(--text-muted); margin-top:-10px; }

  .lg-rowbtw { display:flex; align-items:center; justify-content:space-between; }
  .lg-link { background:none; border:none; padding:0; cursor:pointer; white-space:nowrap;
    font-family:var(--font-display); font-weight:600; font-size:13px; color:var(--text-brand); }
  .lg-remember { display:flex; align-items:center; gap:9px; font-size:13px; color:var(--text-secondary); font-weight:500; white-space:nowrap; }
  .lg-rowbtw { gap:10px; }

  .lg-div { display:flex; align-items:center; gap:12px; color:var(--text-muted); font-size:12px; font-family:var(--font-mono); letter-spacing:.04em; }
  .lg-div::before, .lg-div::after { content:""; height:1px; flex:1; background:var(--border-default); }

  .lg-social { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .lg-foot { text-align:center; font-size:13.5px; color:var(--text-secondary); margin-top:2px; }
  .lg-eye { background:none; border:none; padding:0; cursor:pointer; color:var(--text-muted); display:inline-flex; }
  .lg-eye svg { width:20px; height:20px; }

  .lg-statusbar { position:absolute; top:0; left:0; right:0; z-index:6; display:flex; justify-content:space-between; align-items:center;
    padding:10px 24px 4px; color:#fff; font-family:var(--font-display); font-weight:600; font-size:14px; }
  .lg-statusbar svg { width:16px; height:16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { Button, Input, SegmentedControl, Switch } = window.OtoGODesignSystem_f7ff63;
    const I = (n, s) => <i data-lucide={n} style={s}></i>;

    function AppleGlyph() {
      return (<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
        <path d="M16.36 12.86c-.02-2.04 1.67-3.02 1.74-3.07-.95-1.39-2.43-1.58-2.96-1.6-1.26-.13-2.46.74-3.1.74-.64 0-1.62-.72-2.66-.7-1.37.02-2.63.8-3.34 2.02-1.42 2.47-.36 6.12 1.02 8.12.68.98 1.49 2.08 2.55 2.04 1.02-.04 1.41-.66 2.64-.66 1.23 0 1.58.66 2.66.64 1.1-.02 1.79-1 2.46-1.98.78-1.13 1.1-2.23 1.12-2.29-.02-.01-2.15-.83-2.17-3.27zM14.6 6.6c.56-.68.94-1.62.84-2.56-.81.03-1.79.54-2.37 1.22-.52.6-.98 1.56-.86 2.48.9.07 1.83-.46 2.39-1.14z"/>
      </svg>);
    }
    function GoogleGlyph() {
      return (<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="#4285F4" d="M21.6 12.23c0-.68-.06-1.34-.18-1.96H12v3.7h5.38a4.6 4.6 0 0 1-2 3.02v2.5h3.24c1.9-1.74 2.98-4.3 2.98-7.26z"/>
        <path fill="#34A853" d="M12 22c2.7 0 4.96-.9 6.62-2.43l-3.24-2.5c-.9.6-2.05.96-3.38.96-2.6 0-4.8-1.76-5.58-4.12H3.06v2.58A10 10 0 0 0 12 22z"/>
        <path fill="#FBBC05" d="M6.42 13.9a6 6 0 0 1 0-3.82V7.5H3.06a10 10 0 0 0 0 9z"/>
        <path fill="#EA4335" d="M12 5.96c1.47 0 2.78.5 3.82 1.5l2.85-2.85C16.95 2.99 14.7 2 12 2A10 10 0 0 0 3.06 7.5l3.36 2.58C7.2 7.72 9.4 5.96 12 5.96z"/>
      </svg>);
    }

    function Login() {
      const [mode, setMode] = React.useState('login');   // 'login' | 'register'
      const [show, setShow] = React.useState(false);
      const [remember, setRemember] = React.useState(true);
      const scrollRef = React.useRef(null);
      const isReg = mode === 'register';

      React.useEffect(() => { lucide.createIcons(); }, [mode, show]);

      // scroll back to the hero whenever the user switches login ↔ register
      const switchMode = (m) => {
        setMode(m);
        if (scrollRef.current) scrollRef.current.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const go = (e) => { e && e.preventDefault(); window.location.href = 'index.html'; };

      return (
        <div className="sg-phone">
          <div className="sg-phone__notch"></div>
          <div className="sg-screen">

            <div className="lg-statusbar">
              <span>9:41</span>
              <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                {I('signal')}{I('wifi')}{I('battery-full', { width:20, height:20 })}
              </div>
            </div>

            {/* hero + sheet share one scroll container: scrolling slides the logo away natively */}
            <div className="lg-scroll" ref={scrollRef}>
              <div className="lg-topsafe"></div>

              {/* ---- Hero ---- */}
              <div className="lg-hero">
                <div className="lg-hero__sheen"></div>
                <div className="lg-ring" style={{ width:120, height:120 }}></div>
                <div className="lg-ring" style={{ width:210, height:210 }}></div>
                <div className="lg-ring" style={{ width:320, height:320 }}></div>
                <img className="lg-mark" src="../design-system/assets/app-icon.svg" alt="ŠotoGO" />
                <div className="lg-wordmark">Šoto<span className="go">GO</span></div>
                <div className="lg-tag">Chyť je všechny · sbírej MHD</div>
              </div>

              {/* ---- Sheet ---- */}
              <div className="lg-sheet">
                <div className="lg-grab"></div>
                <form className="lg-sheet__body" onSubmit={go}>

                  <SegmentedControl
                    fullWidth
                    value={mode}
                    onChange={switchMode}
                  options={[
                    { value:'login', label:'Přihlášení' },
                    { value:'register', label:'Registrace' },
                  ]}
                />

                <div>
                  <h1 className="lg-title">{isReg ? 'Pojď sbírat' : 'Vítej zpátky, šotouši'}</h1>
                </div>

                {isReg && (
                  <Input
                    label="Přezdívka"
                    placeholder="napr. sotous_petr"
                    leadingIcon={I('at-sign')}
                    autoComplete="username"
                  />
                )}

                <Input
                  label="E-mail"
                  type="email"
                  placeholder="petr@email.cz"
                  leadingIcon={I('mail')}
                  autoComplete="email"
                />

                <Input
                  label="Heslo"
                  type={show ? 'text' : 'password'}
                  placeholder="••••••••"
                  leadingIcon={I('lock')}
                  autoComplete={isReg ? 'new-password' : 'current-password'}
                  trailingIcon={
                    <button type="button" className="lg-eye" aria-label="Zobrazit heslo" onClick={() => setShow(s => !s)}>
                      {I(show ? 'eye-off' : 'eye')}
                    </button>
                  }
                />

                <div className="lg-rowbtw">
                  <label className="lg-remember">
                    <Switch checked={remember} onChange={e => setRemember(e.target.checked)} />
                    Zůstat přihlášen
                  </label>
                  {!isReg && <button type="button" className="lg-link">Zapomenuté heslo?</button>}
                </div>

                <Button type="submit" variant="primary" size="lg" fullWidth trailingIcon={I('arrow-right')}>
                  {isReg ? 'Vytvořit účet' : 'Přihlásit se'}
                </Button>

                <div className="lg-div">nebo</div>

                <div className="lg-social">
                  <Button type="button" variant="secondary" size="lg" leadingIcon={<AppleGlyph />} onClick={go}>Apple</Button>
                  <Button type="button" variant="secondary" size="lg" leadingIcon={<GoogleGlyph />} onClick={go}>Google</Button>
                </div>

                <div className="lg-foot">
                  {isReg ? 'Už máš účet? ' : 'Nemáš účet? '}
                  <button type="button" className="lg-link" onClick={() => switchMode(isReg ? 'login' : 'register')}>
                    {isReg ? 'Přihlas se' : 'Zaregistruj se'}
                  </button>
                </div>
              </form>
            </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Login />);
  </script>
</body>
</html>
