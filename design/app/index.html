  <script type="text/babel">
/* global React */
const { Button: SGButton } = window.OtoGODesignSystem_f7ff63;

/* CaptureSheet — the camera quick-add flow: aim → scanning → "Nový objev!" reward. */
function CaptureSheet({ onClose, onCatch }) {
  const [phase, setPhase] = React.useState('aim'); // aim | scan | reward
  const cat = window.SG_DATA.CATS.tram;
  const vehicle = { type:'15T', number:'9325', operator:'DPP', cat:'tram' };

  React.useEffect(() => { lucide.createIcons(); });

  React.useEffect(() => {
    if (phase === 'scan') {
      const t = setTimeout(() => setPhase('reward'), 1700);
      return () => clearTimeout(t);
    }
  }, [phase]);

  return (
    <div style={{ position:'absolute', inset:0, zIndex:40, display:'flex', flexDirection:'column',
      background: phase==='reward' ? 'var(--surface-night)' : '#0B0F14' }}>
      {/* top bar */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 16px', color:'#fff' }}>
        <span style={{ fontFamily:'var(--font-display)', fontWeight:600, fontSize:15 }}>
          {phase==='reward' ? 'Nový objev!' : 'Vyfoť vozidlo'}
        </span>
        <button onClick={onClose} style={{ background:'rgba(255,255,255,.14)', border:'none', color:'#fff', width:34, height:34, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
          <i data-lucide="x" style={{ width:18, height:18 }}></i>
        </button>
      </div>

      {phase !== 'reward' && (
        <>
          <div style={{ flex:1, position:'relative', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
            {/* faux viewfinder */}
            <div style={{ position:'absolute', inset:0, background:'radial-gradient(circle at 50% 42%, #2a3340, #0b0f14 75%)' }}></div>
            <i data-lucide={cat.icon} style={{ width:130, height:130, color:'rgba(255,255,255,.18)', position:'relative' }}></i>
            {/* reticle */}
            <div style={{ position:'absolute', width:230, height:150, border:'3px solid rgba(255,255,255,.5)', borderRadius:18, boxShadow:'0 0 0 9999px rgba(0,0,0,.35)' }}>
              {['nw','ne','sw','se'].map((c) => (
                <span key={c} style={{
                  position:'absolute', width:22, height:22,
                  borderTop: c[0]==='n' ? '4px solid var(--brand)' : 'none',
                  borderBottom: c[0]==='s' ? '4px solid var(--brand)' : 'none',
                  borderLeft: c[1]==='w' ? '4px solid var(--brand)' : 'none',
                  borderRight: c[1]==='e' ? '4px solid var(--brand)' : 'none',
                  [c[0]==='n'?'top':'bottom']:-3, [c[1]==='w'?'left':'right']:-3, borderRadius:6,
                }}></span>
              ))}
              {phase==='scan' && (
                <div style={{ position:'absolute', left:0, right:0, height:3, background:'var(--brand)', boxShadow:'0 0 12px var(--brand)', animation:'sgscan 1.5s ease-in-out infinite' }}></div>
              )}
            </div>
            {phase==='scan' && (
              <div style={{ position:'absolute', bottom:24, color:'#fff', fontFamily:'var(--font-mono)', fontSize:13, display:'flex', alignItems:'center', gap:8 }}>
                <i data-lucide="scan-line" style={{ width:16, height:16 }}></i> Čtu evidenční číslo…
              </div>
            )}
          </div>
          <div style={{ padding:'18px 20px 26px' }}>
            <SGButton variant="primary" size="lg" fullWidth leadingIcon={<i data-lucide="camera"></i>}
              onClick={() => setPhase('scan')} disabled={phase==='scan'}>
              {phase==='scan' ? 'Skenuji…' : 'Vyfotit'}
            </SGButton>
          </div>
        </>
      )}

      {phase === 'reward' && (
        <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'0 24px 30px', textAlign:'center' }}>
          <div className="sg-reward-pop" style={{ width:118, height:118, borderRadius:'50%', background:'color-mix(in srgb, var(--cat-tram) 22%, transparent)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:22, boxShadow:'0 0 0 8px color-mix(in srgb, var(--cat-tram) 12%, transparent)' }}>
            <div style={{ width:84, height:84, borderRadius:'50%', background:'var(--cat-tram)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff' }}>
              <i data-lucide={cat.icon} style={{ width:44, height:44 }}></i>
            </div>
          </div>
          <div className="eyebrow" style={{ color:'var(--gold-300)', marginBottom:8 }}>Nový objev!</div>
          <div style={{ fontFamily:'var(--font-mono)', fontWeight:700, fontSize:30, color:'#fff', letterSpacing:'-.01em' }}>{vehicle.type} #{vehicle.number}</div>
          <div style={{ color:'var(--text-on-night-muted)', marginTop:4, marginBottom:18 }}>Tramvaj · {vehicle.operator}</div>
          <div style={{ display:'inline-flex', alignItems:'center', gap:6, fontFamily:'var(--font-display)', fontWeight:700, fontSize:20, color:'#4a2d00', background:'var(--xp)', padding:'8px 18px', borderRadius:'var(--radius-pill)', marginBottom:30 }}>
            <i data-lucide="zap" style={{ width:20, height:20 }}></i> +100 XP
          </div>
          <SGButton variant="reward" size="lg" fullWidth leadingIcon={<i data-lucide="plus"></i>}
            onClick={() => { onCatch && onCatch(); onClose(); }}>
            Přidat do parku
          </SGButton>
        </div>
      )}
    </div>
  );
}

window.CaptureSheet = CaptureSheet;

</script>
  <script type="text/babel">
/* global React, L */
const { Badge: SGMapBadge } = window.OtoGODesignSystem_f7ff63;

const LINE_COLOR = { A:'var(--line-a)', B:'var(--line-b)', C:'var(--line-c)' };
const LINE_HEX = { A:'#00A562', B:'#F7A600', C:'#D9282F' };

function MapScreen() {
  const D = window.SG_DATA;
  const mapEl = React.useRef(null);
  const [sheet, setSheet] = React.useState(D.STOPS[0]);

  React.useEffect(() => {
    const map = L.map(mapEl.current, { zoomControl:false, attributionControl:false })
      .setView([50.0865, 14.4330], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
    }).addTo(map);

    // player location — pulsing green dot
    const player = L.divIcon({
      className:'', iconSize:[26,26], iconAnchor:[13,13],
      html:`<div class="sg-player-dot"></div>`,
    });
    L.marker([50.0890, 14.4395], { icon: player, zIndexOffset: 1000 }).addTo(map);

    // stop markers
    D.STOPS.forEach((s) => {
      const c = LINE_HEX[s.lines[0]] || '#43B02A';
      const icon = L.divIcon({
        className:'', iconSize:[34,42], iconAnchor:[17,42],
        html:`<div class="sg-stop-pin" style="--pin:${c}">
                <div class="sg-stop-pin__head"><span>${s.lines[0]}</span></div>
              </div>`,
      });
      L.marker([s.lat, s.lng], { icon }).addTo(map).on('click', () => setSheet(s));
    });

    setTimeout(() => map.invalidateSize(), 60);
    return () => map.remove();
  }, []);

  return (
    <div style={{ position:'absolute', inset:0 }}>
      <div ref={mapEl} style={{ position:'absolute', inset:0, background:'#e9eef2', zIndex:0, isolation:'isolate' }}></div>

      {/* TOP floating HUD */}
      <div style={{ position:'absolute', top:12, left:12, right:12, zIndex:5, display:'flex', flexDirection:'column', gap:10, pointerEvents:'none' }}>
        <div className="sg-hud" style={{ display:'flex', alignItems:'center', gap:10, pointerEvents:'auto' }}>
          <div style={{ width:34, height:34, borderRadius:'50%', background:'var(--xp)', color:'#4a2d00', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--font-display)', fontWeight:700, fontSize:14, flex:'none' }}>12</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:'flex', justifyContent:'space-between', fontFamily:'var(--font-mono)', fontSize:10, color:'var(--text-on-night-muted)', marginBottom:3 }}>
              <span>LEVEL 12</span><span>2480 / 3000 XP</span>
            </div>
            <div style={{ height:6, background:'rgba(255,255,255,.16)', borderRadius:'999px', overflow:'hidden' }}>
              <div style={{ width:'82%', height:'100%', background:'var(--xp)', borderRadius:'999px' }}></div>
            </div>
          </div>
        </div>
        <div className="sg-hud" style={{ display:'flex', alignItems:'center', gap:9, padding:'10px 14px', pointerEvents:'auto' }}>
          <i data-lucide="search" style={{ width:18, height:18, color:'var(--text-on-night-muted)' }}></i>
          <span style={{ color:'var(--text-on-night-muted)', fontSize:14 }}>Hledat zastávku nebo linku…</span>
        </div>
      </div>

      {/* locate FAB */}
      <button className="sg-locate" style={{ zIndex:5 }} aria-label="Moje poloha">
        <i data-lucide="locate-fixed" style={{ width:22, height:22 }}></i>
      </button>

      {/* BOTTOM stop sheet */}
      <div style={{ position:'absolute', left:12, right:12, bottom:14, zIndex:5 }}>
        <div style={{ background:'var(--surface-card)', borderRadius:'var(--radius-xl)', boxShadow:'var(--shadow-lg)', padding:'14px 16px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:11 }}>
            <div style={{ display:'flex', gap:4 }}>
              {sheet.lines.map((l) => (
                <span key={l} style={{ width:26, height:26, borderRadius:7, background:LINE_COLOR[l], color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--font-display)', fontWeight:700, fontSize:14 }}>{l}</span>
              ))}
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontFamily:'var(--font-display)', fontWeight:600, fontSize:16, color:'var(--text-primary)' }}>{sheet.name}</div>
              <div style={{ display:'flex', alignItems:'center', gap:5, fontSize:12, color:'var(--text-muted)' }}>
                <i data-lucide="navigation" style={{ width:12, height:12 }}></i>{sheet.dist} odsud
              </div>
            </div>
            {sheet.visited
              ? <SGMapBadge tone="success" variant="soft" icon={<i data-lucide="check"></i>}>Navštíveno</SGMapBadge>
              : <span style={{ display:'inline-flex', alignItems:'center', gap:4, fontFamily:'var(--font-display)', fontWeight:700, fontSize:13, color:'var(--gold-700)', background:'var(--xp-subtle)', padding:'6px 11px', borderRadius:'999px' }}><i data-lucide="zap" style={{ width:14, height:14 }}></i>+{sheet.xp} XP</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

window.MapScreen = MapScreen;

</script>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:16 }}>
          <SGP.StatTile value={v.rarity==='legendary'?'★★★★':v.rarity==='epic'?'★★★':v.rarity==='rare'?'★★':'★'} label="Vzácnost" color={`var(--rarity-${v.rarity})`} icon={<i data-lucide="star"></i>} />
          <SGP.StatTile value={v.found} label="Nalezeno" color="var(--brand)" icon={<i data-lucide="calendar-check"></i>} />
        </div>
      </div>
    </div>
  );
}

function ParkScreen() {
  const D = window.SG_DATA;
  const [filter, setFilter] = React.useState('all');
  const [view, setView] = React.useState('mrizka');
  const [detail, setDetail] = React.useState(null);

  React.useEffect(() => { lucide.createIcons(); });

  const cats = Object.values(D.CATS);
  const counts = {};
  cats.forEach(c => counts[c.key] = D.VEHICLES.filter(v => v.cat === c.key).length);
  const list = D.VEHICLES.filter(v => filter === 'all' || v.cat === filter);
  const locked = filter === 'all' ? 4 : (D.LOCKED_COUNT[filter] || 0);
  const totalFound = D.VEHICLES.length, totalAll = totalFound + Object.values(D.LOCKED_COUNT).reduce((a,b)=>a+b,0);

  return (
    <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column' }}>
      <window.TopBar title="Vozový park" subtitle={`${totalFound} z ${totalAll} vozidel`} />
      <div style={{ flex:1, overflowY:'auto', padding:'14px 16px 90px' }}>
        {/* completion */}
        <div style={{ background:'var(--surface-card)', borderRadius:'var(--radius-lg)', boxShadow:'inset 0 0 0 1px var(--border-subtle)', padding:14, marginBottom:14 }}>
          <SGP.ProgressBar value={totalFound} max={totalAll} color="var(--brand)" label="Dokončení sbírky"
            showValue valueText={`${Math.round(totalFound/totalAll*100)} %`} />
        </div>

        {/* category filters */}
        <div style={{ display:'flex', gap:8, overflowX:'auto', paddingBottom:10, margin:'0 -16px', padding:'0 16px 10px' }}>
          <SGP.Tag selected={filter==='all'} color="var(--brand)" icon={<i data-lucide="layout-grid"></i>} count={totalFound} onClick={()=>setFilter('all')}>Vše</SGP.Tag>
          {cats.map(c => (
            <SGP.Tag key={c.key} selected={filter===c.key} color={c.color} icon={<i data-lucide={c.icon}></i>} count={counts[c.key]} onClick={()=>setFilter(c.key)}>{c.plural}</SGP.Tag>
          ))}
        </div>

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', margin:'4px 0 12px' }}>
          <span className="eyebrow">{filter==='all' ? 'Všechna vozidla' : D.CATS[filter].plural}</span>
          <SGP.SegmentedControl value={view} onChange={setView} options={[
            { value:'mrizka', icon:<i data-lucide="layout-grid"></i> },
            { value:'seznam', icon:<i data-lucide="list"></i> },
          ]} />
        </div>

        <div style={{ display:'grid', gridTemplateColumns: view==='mrizka' ? '1fr 1fr' : '1fr', gap:12 }}>
          {list.map((v) => {
            const c = D.CATS[v.cat];
            return (
              <SGP.VehicleCard key={v.type+v.number} type={v.type} number={v.number} operator={v.operator}
                category={c.label} categoryColor={c.color} categoryIcon={<i data-lucide={c.icon}></i>}
                rarity={v.rarity} found={v.found} isNew={v.isNew} onClick={()=>setDetail(v)} />
            );
          })}
          {Array.from({ length: locked }).map((_, i) => (
            <SGP.VehicleCard key={'lock'+i} locked categoryColor={filter==='all' ? 'var(--cat-train)' : D.CATS[filter].color} />
          ))}
        </div>
      </div>

      {detail && <VehicleDetail v={detail} onClose={()=>setDetail(null)} />}
    </div>
  );
}

window.ParkScreen = ParkScreen;

</script>

/* global React, ReactDOM */
const { BottomNav: SGBottomNav } = window.OtoGODesignSystem_f7ff63;

function StatusBar({ dark }) {
  const color = dark ? '#fff' : 'var(--text-primary)';
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 22px 4px', color, fontFamily:'var(--font-display)', fontWeight:600, fontSize:14, position:'relative', zIndex:6 }}>

        <i data-lucide="wifi" style={{ width:16, height:16 }}></i>
        <i data-lucide="battery-full" style={{ width:20, height:20 }}></i>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('mapa');
  const [capture, setCapture] = React.useState(false);

  React.useEffect(() => { lucide.createIcons(); });

  const onNav = (id) => {
    if (id === 'kamera') { setCapture(true); return; }
    setTab(id);
  };

  const isMap = tab === 'mapa';
  const Screen = {
    mapa: window.MapScreen,
    park: window.ParkScreen,
    vyzvy: window.VyzvyScreen,
    profil: window.ProfilScreen,
  }[tab];

  return (
    <div className="sg-phone">
      <div className="sg-phone__notch"></div>
      <div className="sg-screen" style={{ background: isMap ? '#e9eef2' : 'var(--bg-app)' }}>
        <StatusBar dark={false} />
        <div style={{ position:'absolute', top:0, left:0, right:0, bottom:'var(--bottom-nav-h)' }}>
          <div style={{ position:'absolute', inset:0, top:32 }}>
            <Screen key={tab} />
          </div>
        </div>

        <div style={{ position:'absolute', left:0, right:0, bottom:0 }}>
          <SGBottomNav value={tab} onChange={onNav} items={[
            { id:'mapa',  label:'Mapa',  icon:<i data-lucide="map"></i> },
            { id:'park',  label:'Park',  icon:<i data-lucide="layout-grid"></i> },
            { id:'kamera', label:'Kamera', icon:<i data-lucide="camera"></i>, fab:true },
            { id:'vyzvy', label:'Výzvy', icon:<i data-lucide="target"></i>, badge:2 },
            { id:'profil', label:'Profil', icon:<i data-lucide="user"></i> },
          ]} />
        </div>

        {capture && <window.CaptureSheet onClose={()=>setCapture(false)} onCatch={()=>setTab('park')} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
